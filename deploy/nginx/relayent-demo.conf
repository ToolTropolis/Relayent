# Relayent Demo vhost — relayent-demo.ignorelist.com
#
# OWNED BY the Relayent project. Mounted into the host's nginx from
# /opt/relayent/nginx/ — no Relayent config lives in any app's repo. Proxies to
# the relayent-demo container over relayent-network. See deploy/nginx/README.md.
server {
    listen 80;
    server_name relayent-demo.ignorelist.com;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    server_name relayent-demo.ignorelist.com;

    ssl_certificate     /etc/letsencrypt/live/relayent-demo.ignorelist.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/relayent-demo.ignorelist.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           DENY always;
    add_header X-Content-Type-Options    nosniff always;
    add_header Referrer-Policy           no-referrer always;

    client_max_body_size 2M;

    location / {
        proxy_pass         http://relayent-demo:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # The demo serves its own CSP (per-request nonce) on its page; let it pass
        # through unchanged (this vhost sets no CSP of its own).

        # A chat message long-polls the relay up to ~90s; keep well above that.
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;
        proxy_connect_timeout 10s;
        proxy_buffering off;
    }
}
