# Relayent relay vhost — relayent.ignorelist.com
#
# OWNED BY the Relayent project (github.com/ToolTropolis/Relayent). It is mounted
# INTO whatever nginx fronts the host — on a shared host that is the app's nginx
# (e.g. EngageHub's), but no Relayent config lives in that app's repo: the app's
# compose mounts this file from /opt/relayent/nginx/. See deploy/nginx/README.md.
#
# REQUIRES (nginx refuses to start a TLS block whose cert is unreadable):
#   1. /etc/letsencrypt/live/relayent.ignorelist.com/  — issue with certbot
#      (webroot keeps nginx up; see deploy/nginx/README.md).
#   2. The relayent-relay container reachable by name on relayent-network — the
#      proxy's own service must join that external network or proxy_pass 502s.
#
# VERIFY
#   curl -s https://relayent.ignorelist.com/v1/health   -> {"status":"ok"}
#   curl -s https://relayent.ignorelist.com/v1/status -H "Authorization: Bearer $KEY" | grep '"tls":true'

server {
    listen 80;
    server_name relayent.ignorelist.com;

    # Served over HTTP so certbot can renew without stopping nginx. The initial
    # cert was issued with --standalone; --webroot renewals need this path to be
    # reachable and mounted into the container.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name relayent.ignorelist.com;

    # TLS — same policy as the EngageHub vhost above.
    ssl_certificate     /etc/letsencrypt/live/relayent.ignorelist.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/relayent.ignorelist.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # Security headers. The relay serves its own CSP (with a per-request nonce)
    # on its HTML pages, so no CSP is set here and the upstream one is passed
    # through (see the proxy block — we do not hide it).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           DENY always;
    add_header X-Content-Type-Options    nosniff always;
    add_header Referrer-Policy           no-referrer always;
    add_header Permissions-Policy        "geolocation=(), camera=(), microphone=()" always;

    client_max_body_size 2M;   # /v1/jobs caps bodies at 1 MiB; this is headroom

    # NOTE: no `limit_conn perip` here, unlike the EngageHub vhost. A bridge holds
    # one long-poll open continuously and a consumer may hold another while waiting
    # for a result — a connection cap would sever them mid-job and look like the
    # bridge failing. The relay does its own per-key and per-IP rate limiting.

    location / {
        proxy_pass         http://relayent-relay:8787;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        # The relay reports "tls":true from this header (RELAYENT_TRUST_PROXY=1).
        # If it is missing, the relay's status page tells users their traffic is
        # unencrypted even though it is not.
        proxy_set_header   X-Forwarded-Proto $scheme;

        # The relay serves its own CSP (per-request nonce) on its HTML pages; let
        # it pass through unchanged. This vhost sets no CSP of its own, so hiding
        # the upstream header would leave the browser with none.

        # LOAD-BEARING: the /v1 API long-polls. GET /v1/jobs/{id}?wait=1 blocks up
        # to 90s and the bridge's poll ~25s. nginx defaults to 60s, which would cut
        # jobs off mid-flight and surface as a bridge failure rather than a proxy
        # timeout. 120s leaves margin above the relay's own 90s ceiling.
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;
        proxy_connect_timeout 10s;

        # Long-polling must not sit in a proxy buffer waiting to fill.
        proxy_buffering off;
    }
}
