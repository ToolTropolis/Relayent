openapi: 3.1.0
info:
  title: Relayent Relay API
  version: "1.0.0"
  description: |
    Relayent lets any app route AI generation to a user's locally-running CLI
    subscription (Claude Code, Codex, Gemini, Cursor) instead of a paid API key.

    This is the ONLY integration surface. Apps enqueue a job; a bridge daemon on
    the user's machine long-polls, runs the local CLI headless, and posts the
    result back. All requests authenticate with a per-tenant bearer "pairing key";
    every job is scoped to that key.

    Two deployment models: SINGLE-KEY (one shared pairing key, stateless) and
    MULTI-TENANT (RELAYENT_DATA_DIR + OIDC: per-user identity, isolation, admin).
    The endpoints under /v1/auth, /v1/enroll and /v1/admin exist only in the
    multi-tenant model. Humans sign in at the /login page (OIDC or a bootstrap
    admin token); the OIDC callback then routes by role — an admin to the /admin
    console, a regular user to / (their own status page). /login and /admin are
    HTML pages, not part of this JSON contract.

    Typical consumer flow:
      1. GET  /v1/bridge/online   -> fail fast if no bridge is polling
      2. POST /v1/jobs            -> { job_id }
      3. GET  /v1/jobs/{id}?wait=1 (long-poll) -> { status: done|error, json|text }
servers:
  - url: http://localhost:8787
    description: Local relay
security:
  - PairingKey: []
paths:
  /v1/health:
    get:
      summary: Liveness check (no auth)
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }
  /v1/bridge/online:
    get:
      summary: Is a bridge currently polling for this pairing key?
      responses:
        "200":
          description: Presence status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BridgeOnlineResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
  /v1/status:
    get:
      summary: Relay health and introspection for the caller's pairing key
      responses:
        "200":
          description: Relay status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
  /v1/bridge/capabilities:
    get:
      summary: What backends the caller's bridge reports it can run
      description: |
        Online is false and backends is empty when no bridge has reported for this
        pairing key recently. A backend is only usable when ready is true.
      responses:
        "200":
          description: Last reported bridge capabilities
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CapabilitiesResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      summary: Bridge self-reports its capabilities
      description: |
        Called by the bridge on startup and periodically thereafter. The relay cannot
        see the user's machine, so this is the only source of backend availability.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BridgeCapabilities"
      responses:
        "200":
          description: Capabilities recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: recorded }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /v1/enroll:
    post:
      summary: Redeem a one-time enrollment token for a bridge credential (multi-tenant)
      description: |
        A bridge redeems an admin-issued one-time token to obtain its own
        long-lived credential, bound to the token's user. The token IS the
        authentication, so this endpoint is otherwise unauthenticated (but
        rate-limited and one-time). The returned credential is shown ONCE.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EnrollRequest" }
      responses:
        "200":
          description: Bridge credential issued (once)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EnrollResponse" }
        "401": { description: Invalid, expired, or already-used token }
        "404": { description: Enrollment not enabled (no store) }
        "429": { $ref: "#/components/responses/Unauthorized" }
  /v1/auth/login:
    get:
      summary: Begin OIDC sign-in — redirects to the provider (multi-tenant, browser)
      description: |
        Browser endpoint. Sets a short-lived signed state cookie and 302-redirects
        to the configured OIDC provider. Present only when OIDC is configured. Not
        a JSON API — used by the /login page.
      security: []
      responses:
        "302": { description: Redirect to the OIDC provider }
        "404": { description: OIDC not configured }
  /v1/auth/callback:
    get:
      summary: OIDC redirect target — completes sign-in, redirects by role (multi-tenant, browser)
      description: |
        The provider redirects here with code+state. The relay verifies state, the
        id_token (iss/aud/exp, and hd if a hosted domain is set), upserts the user
        (the FIRST-EVER user becomes admin), sets a session cookie, and redirects by
        role: an admin to /admin, a regular user to / (their own status page).
      security: []
      parameters:
        - { name: code, in: query, schema: { type: string } }
        - { name: state, in: query, schema: { type: string } }
      responses:
        "302": { description: Signed in — redirected to /admin or / by role }
        "400": { description: Invalid or expired login state }
        "401": { description: id_token verification failed }
        "403": { description: Account outside the permitted hosted domain }
  /v1/auth/logout:
    get:
      summary: Clear the session cookie (multi-tenant, browser)
      security: []
      responses:
        "302": { description: Session cleared — redirected to / }
  /v1/admin/users:
    get:
      summary: List users with per-user activity — NO content (admin)
      responses:
        "200": { description: Users + activity (no prompt/result content) }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { description: Not an admin }
    post:
      summary: Create or pre-provision a user (admin)
      description: |
        Normally a user is created automatically on first OIDC login; this
        pre-provisions one. NOTE: any user existing before the operator's own first
        OIDC login means that login is not the first user, so it does NOT bootstrap
        to admin — promote it explicitly with POST /v1/admin/users/{sub}/role.
      responses:
        "201": { description: Created }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { description: Not an admin }
  /v1/admin/users/{sub}/role:
    post:
      summary: Grant or revoke admin for a user (admin)
      description: |
        The ONLY path that changes a role — a normal OIDC login cannot self-promote
        (an existing user's stored role is preserved on login). An admin cannot
        demote themselves, so the last admin cannot be locked out by accident.
      parameters:
        - { name: sub, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SetUserRoleRequest" }
      responses:
        "200": { description: Role changed }
        "400": { description: Invalid role, or admin attempted to demote themselves }
        "403": { description: Not an admin }
        "404": { description: Unknown user }
  /v1/admin/users/{sub}/disabled:
    post:
      summary: Disable or re-enable a user (admin)
      description: |
        A disabled user's bridge and app-targeted jobs are refused immediately
        (role/disabled is re-checked per request).
      parameters:
        - { name: sub, in: path, required: true, schema: { type: string } }
        - name: disabled
          in: query
          schema: { type: string, enum: ["true", "false"] }
          description: Defaults to true (disable). Pass false to re-enable.
      responses:
        "200": { description: Disabled/enabled }
        "403": { description: Not an admin }
        "404": { description: Unknown user }
  /v1/admin/users/{sub}:
    delete:
      summary: Delete a user record (admin)
      description: |
        Removes the user. Bridge bindings and app credentials are NOT auto-revoked —
        revoke those separately. An admin cannot delete themselves.
      parameters:
        - { name: sub, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Deleted }
        "400": { description: An admin attempted to delete themselves }
        "403": { description: Not an admin }
        "404": { description: Unknown user }
  /v1/admin/enroll-tokens:
    post:
      summary: Mint a one-time enrollment token for a user (admin)
      responses:
        "200":
          description: The one-time token (shown once)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EnrollTokenResponse" }
        "403": { description: Not an admin }
  /v1/admin/app-creds:
    get:
      summary: List app credentials — ids + metadata, NO secrets (admin)
      responses:
        "200": { description: App credentials without secrets/hashes }
        "403": { description: Not an admin }
    post:
      summary: Issue an app credential — secret shown once (admin)
      responses:
        "200":
          description: The app credential (secret shown once)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CreateAppCredResponse" }
        "403": { description: Not an admin }
  /v1/admin/app-creds/{id}/revoke:
    post:
      summary: Revoke an app credential by its public id (admin)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Revoked }
        "403": { description: Not an admin }
        "404": { description: Unknown credential }
  /v1/admin/config:
    get:
      summary: Read-only snapshot of the relay's effective config — NO secrets (admin)
      description: |
        The relay's effective configuration for the Configure view: version, listen,
        trust-proxy, store/data-dir, and non-secret OIDC identifiers (issuer, client
        id, redirect, provider). Secret VALUES are never returned — only booleans for
        whether the pairing key and admin token are set. Config is env/compose-driven;
        this endpoint reads it, it does not change it.
      responses:
        "200":
          description: Effective configuration (no secret values)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminConfig" }
        "403": { description: Not an admin }
  /v1/admin/audit:
    get:
      summary: Recent audit events — per-user history, NO content (admin)
      description: |
        Append-only audit log: who did what, when, which backend, success/
        failure, and byte-LENGTHS — never prompt or result content. Optional
        query params user=<sub> and limit=<n>.
      responses:
        "200": { description: Audit events (no content) }
        "403": { description: Not an admin }
  /v1/jobs:
    post:
      summary: Enqueue an AI job for the user's local bridge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnqueueRequest"
      responses:
        "202":
          description: Job accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnqueueResponse"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /v1/jobs/next:
    get:
      summary: Bridge long-polls for the next queued job
      description: Used by the bridge daemon. Returns 204 if no job arrives within `wait` seconds.
      parameters:
        - name: wait
          in: query
          schema: { type: integer, default: 25, maximum: 55 }
          description: Seconds to block waiting for a job.
      responses:
        "200":
          description: A job to run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "204": { description: No job available within the wait window }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /v1/jobs/{id}/result:
    post:
      summary: Bridge posts a job's result
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResultRequest"
      responses:
        "200": { description: Result recorded }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
  /v1/jobs/{id}:
    delete:
      summary: Cancel a job
      description: |
        Abandons a job. The response says what the job was doing when the request
        arrived, because that determines whether anything was actually saved:

        - `was_status: pending` — it was still queued and has been removed. No
          bridge will run it; the work is genuinely prevented.
        - `was_status: running` — a bridge had already claimed it. **The CLI it
          started cannot be stopped**: the relay has no channel to an
          outbound-only bridge. The caller stops waiting and a late result is
          discarded, but the work and any subscription quota are already spent.
        - `was_status: done`/`error` — it had already finished; `cancelled` is false.

        Cancelling unblocks anyone waiting in `GET /v1/jobs/{id}?wait=1`.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Cancellation outcome
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    get:
      summary: Consumer fetches a job's status/result
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: wait
          in: query
          schema: { type: string, enum: ["0", "1", "true", "false"] }
          description: Set to 1/true to long-poll until the result is ready.
      responses:
        "200":
          description: Current job status and result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobResult"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
components:
  securitySchemes:
    PairingKey:
      type: http
      scheme: bearer
      description: |
        Single-key model, or legacy during migration: one shared pairing key held by
        the consuming app and the bridge. Possession is authorization.
    AppKey:
      type: http
      scheme: bearer
      description: |
        Multi-tenant: an app credential "<id>.<secret>" issued by an admin. Scoped
        (usually enqueue-only) and names target_user per job. Stored hashed.
    BridgeCredential:
      type: http
      scheme: bearer
      description: |
        Multi-tenant: a bridge's own credential "<id>.<secret>", obtained by redeeming
        a one-time enrollment token at /v1/enroll. Bound to one user; self-routes.
    AdminToken:
      type: http
      scheme: bearer
      description: |
        Multi-tenant bootstrap: RELAYENT_ADMIN_TOKEN grants admin scope directly for
        the /v1/admin/* API. Intended for bootstrap before a real OIDC admin exists.
    OIDCSession:
      type: apiKey
      in: cookie
      name: relayent_session
      description: |
        Multi-tenant: an HMAC-signed session cookie set after OIDC sign-in at /login.
        Carries the human's identity; admin scope depends on the user's stored role.
  responses:
    Unauthorized:
      description: Missing or invalid pairing key
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    NotFound:
      description: Unknown job for this pairing key
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
  schemas:
    EnqueueRequest:
      type: object
      required: [backend, prompt]
      properties:
        backend: { type: string, enum: [claude, codex, gemini, cursor] }
        model: { type: string, description: Optional CLI model override }
        prompt: { type: string }
        system: { type: string, description: Optional system instruction }
        json_schema:
          description: Optional JSON Schema; when set the bridge requests structured JSON.
          type: object
          additionalProperties: true
        target_user:
          type: string
          description: |
            Multi-tenant only. Routes the job to a specific user's bridge. Required
            for an app credential serving many users; ignored for a bridge/legacy
            principal, which route to themselves.
    EnqueueResponse:
      type: object
      properties:
        job_id: { type: string }
    Job:
      type: object
      properties:
        id: { type: string }
        backend: { type: string }
        model: { type: string }
        prompt: { type: string }
        system: { type: string }
        json_schema: { type: object, additionalProperties: true }
    ResultRequest:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean }
        json: { description: Parsed object when json_schema was requested }
        text: { type: string }
        error: { type: string }
    JobResult:
      type: object
      properties:
        id: { type: string }
        status: { type: string, enum: [pending, done, error] }
        json: {}
        text: { type: string }
        error: { type: string }
    BridgeOnlineResponse:
      type: object
      properties:
        online: { type: boolean }
    StatusResponse:
      type: object
      properties:
        status: { type: string, example: ok }
        version: { type: string, description: Relay build version }
        uptime_seconds: { type: integer, format: int64 }
        bridge_online:
          type: boolean
          description: Is a bridge currently polling for the caller's key
        pending_jobs: { type: integer, description: Queued jobs for the caller's key }
        require_pairing:
          type: boolean
          description: Is a fixed RELAYENT_PAIRING_KEY enforced by this relay
    BackendInfo:
      type: object
      description: |
        Availability of one backend on the bridge host. These three flags are distinct:
        a CLI can be installed while its adapter is still a stub, in which case the
        backend is not usable. Only trust `ready`.
      properties:
        name: { type: string, enum: [claude, codex, gemini, cursor] }
        installed: { type: boolean, description: "Is the backing CLI present on the bridge host?" }
        supported: { type: boolean, description: "Is the adapter implemented (not a stub)?" }
        ready: { type: boolean, description: "Can this backend actually run jobs now?" }
        model: { type: string, description: "Default model, when the adapter reports one" }
        models:
          type: array
          items: { type: string }
          description: |
            Identifiers accepted as `model` on POST /v1/jobs, so a consumer can
            discover valid values instead of guessing and failing at job time.
            Empty means the backend cannot report them — NOT that models are
            unsupported. Pass a name you know and it still works.
        default_model:
          type: string
          description: What runs when `model` is omitted, when the backend reports one.
        models_probed:
          type: boolean
          description: |
            True when the list came FROM the CLI (accurate for this install);
            false when it is a static declaration that may drift with CLI
            releases. A declared list is advisory, not exhaustive.
    BridgeCapabilities:
      type: object
      required: [version, backends]
      properties:
        version: { type: string, description: Bridge build version }
        hostname: { type: string }
        backends:
          type: array
          items: { $ref: "#/components/schemas/BackendInfo" }
    CapabilitiesResponse:
      type: object
      properties:
        online: { type: boolean }
        reported_at:
          type: string
          format: date-time
          description: RFC3339 timestamp of the last capabilities report
        capabilities: { $ref: "#/components/schemas/BridgeCapabilities" }
    CancelResponse:
      type: object
      properties:
        id: { type: string }
        cancelled:
          type: boolean
          description: Whether anything was actually stopped. False when the job had already finished.
        was_status:
          type: string
          enum: [pending, running, done, error]
          description: What the job was doing when the cancel arrived. `running` means the work was already underway and cannot be recalled.
        detail: { type: string, description: "Human-readable explanation of the outcome" }
    EnrollRequest:
      type: object
      required: [token]
      properties:
        token: { type: string, description: The one-time enrollment token }
    EnrollResponse:
      type: object
      properties:
        bridge_credential: { type: string, description: "<id>.<secret>; shown once, save it" }
        user_email: { type: string, description: The user this bridge is bound to }
    EnrollTokenResponse:
      type: object
      properties:
        token: { type: string, description: One-time token; shown once }
        expires_at: { type: string, format: date-time }
    CreateAppCredResponse:
      type: object
      properties:
        app_id: { type: string }
        credential: { type: string, description: "<id>.<secret>; shown once, save it" }
    SetUserRoleRequest:
      type: object
      required: [role]
      properties:
        role: { type: string, enum: [admin, user] }
    AdminConfig:
      type: object
      description: Effective relay config — NO secret values, only whether each is set.
      properties:
        version: { type: string }
        listen: { type: string, example: ":8787" }
        trust_proxy: { type: boolean }
        store_enabled: { type: boolean, description: Multi-tenant control plane on /data }
        data_dir: { type: string }
        pairing_key_set: { type: boolean, description: Legacy shared key accepted (value never shown) }
        admin_token_set: { type: boolean, description: Bootstrap admin token configured }
        oidc_enabled: { type: boolean }
        oidc_issuer: { type: string, description: Non-secret }
        oidc_client_id: { type: string, description: Non-secret public identifier }
        oidc_redirect: { type: string }
        oidc_provider: { type: string, example: Google }
        hosted_domain: { type: string, description: Workspace lock, if any }
    ErrorResponse:
      type: object
      properties:
        error: { type: string }
